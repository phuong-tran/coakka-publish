name: public-surface

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify public artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out artifacts
        uses: actions/checkout@v6

      - name: Verify public surface
        run: |
          bash -n \
            scripts/scan-public-surface.sh \
            scripts/test-public-surface-scanner.sh \
            scripts/test-public-artifact-manifest.sh \
            scripts/test-runtime-intake-artifact.sh \
            scripts/verify-public-surface.sh
          python3 -m py_compile scripts/verify-runtime-intake-artifact.py
          scripts/test-public-surface-scanner.sh
          scripts/test-public-artifact-manifest.sh
          scripts/test-runtime-intake-artifact.sh
          scripts/verify-public-surface.sh
          for pattern in \
            "private artifact" \
            "private publish" \
            "private source" \
            "private repo" \
            "private repository" \
            "local/private" \
            "private-publish" \
            "source-workspace" \
            "source workspace"
          do
            if git grep -n -I -i -E -- "$pattern" README.md docs logger runtime scripts artifacts; then
              echo "forbidden public wording found: $pattern" >&2
              exit 1
            fi
          done
